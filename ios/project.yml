name: Synapse
options:
  bundleIdPrefix: ai.synapse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.3.10"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Automatic signing with the developer's Personal Team, so device builds are
    # codesigned. Xcode picks the identity per-SDK (Apple Development on device,
    # ad-hoc "Sign to Run Locally" on the simulator) — do not force one here.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "4SUH9X5QWS"
targets:
  Synapse:
    type: application
    platform: iOS
    sources:
      - path: Synapse
    info:
      path: Synapse/Info.plist
      properties:
        CFBundleDisplayName: Synapse
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
        # The app talks to a self-hosted Synapse server, typically over plain HTTP
        # on the LAN / Tailscale. Allow it for this first developer build.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Synapse connects to your self-hosted server on your local network."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.synapse.mobile
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
