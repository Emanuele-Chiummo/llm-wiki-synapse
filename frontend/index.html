<!doctype html>
<!-- lang="en" is the static default; the runtime i18n (i18next + LanguageDetector) applies
     the user's preferred language (IT/EN) to all UI strings via useTranslation(). Updating
     the html[lang] attribute dynamically would require a top-level effect in main.tsx that
     listens to i18n.on("languageChanged") and sets document.documentElement.lang — a
     reasonable future enhancement, but the static "en" default is an acceptable baseline
     since screen readers can detect the per-element language from translated text content. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="The self-hosted LLM wiki that turns your sources into connected knowledge." />
    <title>Synapse — Self-hosted LLM Wiki</title>
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
    <!-- Brand v1.0 favicon: SVG for modern browsers; PNG fallbacks for legacy/pinned-tab -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <meta name="theme-color" content="#4338ca" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Synapse" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
        color: #e6edf3;
        /* Matches the --syn-* stack in theme.css: Geist (loaded via @fontsource-variable/geist)
           leads; system fonts are the pre-load fallback. Was erroneously ending in `monospace`. */
        font-family:
          "Geist Variable",
          "Geist",
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      /* Chat: streaming cursor blink (F6 / ADR-0019) */
      @keyframes synapse-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Chat: markdown body styles */
      .synapse-markdown__body p {
        margin: 0.5em 0;
      }
      .synapse-markdown__body h1,
      .synapse-markdown__body h2,
      .synapse-markdown__body h3,
      .synapse-markdown__body h4 {
        margin: 0.75em 0 0.25em;
        line-height: 1.3;
      }
      .synapse-markdown__body ul,
      .synapse-markdown__body ol {
        padding-left: 1.5em;
        margin: 0.5em 0;
      }
      .synapse-markdown__body li {
        margin: 0.2em 0;
      }
      .synapse-markdown__body code {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 3px;
        padding: 0.1em 0.4em;
        font-family:
          ui-monospace,
          SFMono-Regular,
          SF Mono,
          Menlo,
          Consolas,
          monospace;
        font-size: 0.875em;
      }
      .synapse-markdown__body pre {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 12px;
        overflow-x: auto;
        margin: 0.75em 0;
      }
      .synapse-markdown__body pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.85em;
      }
      .synapse-markdown__body blockquote {
        border-left: 3px solid #30363d;
        padding-left: 1em;
        color: #8b949e;
        margin: 0.5em 0;
      }
      .synapse-markdown__body a {
        color: #58a6ff;
      }
      .synapse-markdown__body table {
        border-collapse: collapse;
        margin: 0.75em 0;
        font-size: 0.875em;
      }
      .synapse-markdown__body th,
      .synapse-markdown__body td {
        border: 1px solid #30363d;
        padding: 6px 12px;
      }
      .synapse-markdown__body th {
        background: #161b22;
      }
      .synapse-markdown__body hr {
        border: none;
        border-top: 1px solid #21262d;
        margin: 1em 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
