<!--
  Synapse favicon — simplified S-mark, transparent background.
  Brand v1.0: gradient diagonal BL→TR (#1D4ED8 · #4338CA · #7C3AED).
  Used at 16px+ (below 24px browsers prefer the PNG variant).
  See: frontend/public/favicon-{16,32,48}.png for the rasterised fallbacks.
-->
<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Synapse">
  <defs>
    <linearGradient id="fvGrad" x1="0" y1="64" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#1D4ED8"/>
      <stop offset="0.5" stop-color="#4338CA"/>
      <stop offset="1"   stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- main synaptic S-path -->
  <path d="M43 19 C 29 17 22 27 32 32 C 42 37 35 47 21 45"
        stroke="url(#fvGrad)" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- core nodes -->
  <circle cx="43" cy="19" r="5.5" fill="url(#fvGrad)"/>
  <circle cx="21" cy="45" r="5.5" fill="url(#fvGrad)"/>
  <circle cx="32" cy="32" r="3"   fill="url(#fvGrad)"/>
</svg>
