# Alembic configuration file
# The actual database URL is taken from the DATABASE_URL env var in env.py.
# This file is kept minimal — no credentials here (AC-DC-5).

[alembic]
# Overridden by env.py via os.environ["DATABASE_URL"]
sqlalchemy.url = postgresql+asyncpg://%(DATABASE_URL)s

script_location = alembic

# Prepend sys.path with the backend/ directory so `from app.models import Base` works
prepend_sys_path = .

file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
