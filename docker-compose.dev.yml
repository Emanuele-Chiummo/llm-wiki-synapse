# docker-compose.dev.yml — local development override
#
# Adds Qdrant + React/Vite frontend as local containers so the full stack
# runs on macOS with a single command, without needing TrueNAS.
# Ollama must already be running at localhost:11434 (e.g. via Ollama.app).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Services added / overridden:
#   qdrant          — local Qdrant container (overrides QDRANT_URL on backend)
#   frontend        — Vite dev server with HMR; proxies API calls to synapse-backend
#   synapse-backend — source-mounted + `uvicorn --reload` so backend code changes
#                     reload live WITHOUT an image rebuild (matches the frontend HMR
#                     loop; fixes the prior front/back skew where the backend image
#                     was stale)
#
# Ports exposed to the host (loopback only — never 0.0.0.0 for data services):
#   5173  — frontend (http://localhost:5173)
#   8000  — backend  (http://localhost:8000)
#   5432  — postgres (127.0.0.1:5432) — dev only; not published in prod compose
#   6333  — qdrant   (127.0.0.1:6333) — dev only; Qdrant is external in prod
#
# Production docker-compose.yml is unchanged.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      # Bound to loopback only (R13-9 / B3): host browser tools can still reach
      # http://127.0.0.1:6333 for Qdrant dashboard, but the port is not open on
      # the LAN/Wi-Fi interface.  In production, Qdrant runs as an external TrueNAS
      # service and is NOT in the compose file at all.
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    # Dev override: expose postgres to the host for interactive psql / GUI tools.
    # Bound to loopback only — not reachable on LAN.
    # In production (docker-compose.yml), the postgres port is NOT published.
    ports:
      - "127.0.0.1:5432:5432"

  synapse-backend:
    environment:
      # Point at the local qdrant container instead of host.docker.internal:6333
      QDRANT_URL: http://qdrant:6333
      # ── F17 CLI provider auth: same three options as prod (ADR-0042) ────────────────────
      # Inherit from .env or set here. See docker-compose.yml for detailed auth docs.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CODE_USE_SUBSCRIPTION: ${CLAUDE_CODE_USE_SUBSCRIPTION:-}
      # ── Remote MCP (Feature A, optional in dev) ────────────────────────────────────
      # Leave both unset to disable HTTP MCP in dev, or set them to test remote MCP locally.
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      MCP_REMOTE_WRITE_ENABLED: ${MCP_REMOTE_WRITE_ENABLED:-false}
    volumes:
      # Live-mount the source over the image copy so edits reload without a rebuild.
      # Only app/ (+ alembic/scripts) — NOT the whole backend/ (avoids overlaying the
      # host macOS .venv onto the linux container).
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      # pyproject too: /status version reads it (ADR-0054 §6) — without this mount the
      # container serves the image-baked copy, frozen at image-build time (was 0.1.0).
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
    # uvicorn --reload watches /app and restarts the server on any .py change.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      qdrant:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Anonymous volume: container installs its own platform-native node_modules
      # without overwriting the host copy (avoids arm64/x86 binary conflicts).
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Browser base stays relative ("") so requests go same-origin to the Vite dev server,
      # which forwards them to the backend via the Docker network (synapse-backend:8000).
      # Do NOT set VITE_API_BASE — it must remain unset so the browser base is relative.
      BACKEND_PROXY_TARGET: http://synapse-backend:8000
    # --host binds Vite to 0.0.0.0 so the port is reachable from the host browser.
    command: sh -c "npm ci --prefer-offline && npm run dev -- --host"
    depends_on:
      - synapse-backend

volumes:
  qdrant_data:
