# docker-compose.dev.yml — local development override
#
# Adds Qdrant + React/Vite frontend as local containers so the full stack
# runs on macOS with a single command, without needing TrueNAS.
# Ollama must already be running at localhost:11434 (e.g. via Ollama.app).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Services added / overridden:
#   qdrant          — local Qdrant container (overrides QDRANT_URL on backend)
#   frontend        — Vite dev server with HMR; proxies API calls to synapse-backend
#   synapse-backend — source-mounted + `uvicorn --reload` so backend code changes
#                     reload live WITHOUT an image rebuild (matches the frontend HMR
#                     loop; fixes the prior front/back skew where the backend image
#                     was stale)
#
# Ports exposed to the host:
#   5173  — frontend (http://localhost:5173)
#   8000  — backend  (http://localhost:8000)
#   5432  — postgres (localhost:5432)
#   6333  — qdrant   (localhost:6333)
#
# Production docker-compose.yml is unchanged.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  synapse-backend:
    environment:
      # Point at the local qdrant container instead of host.docker.internal:6333
      QDRANT_URL: http://qdrant:6333
    volumes:
      # Live-mount the source over the image copy so edits reload without a rebuild.
      # Only app/ (+ alembic/scripts) — NOT the whole backend/ (avoids overlaying the
      # host macOS .venv onto the linux container).
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
    # uvicorn --reload watches /app and restarts the server on any .py change.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      qdrant:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Anonymous volume: container installs its own platform-native node_modules
      # without overwriting the host copy (avoids arm64/x86 binary conflicts).
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://synapse-backend:8000
    # --host binds Vite to 0.0.0.0 so the port is reachable from the host browser.
    command: sh -c "npm ci --prefer-offline && npm run dev -- --host"
    depends_on:
      - synapse-backend

volumes:
  qdrant_data:
