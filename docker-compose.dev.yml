# docker-compose.dev.yml — local development override
#
# Adds Qdrant as a local container so you can run the full stack on macOS
# without needing TrueNAS. Ollama is expected already running at localhost:11434
# (e.g. via the Ollama.app).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This file overrides:
#   - QDRANT_URL → points synapse-backend to the local qdrant service
#   - adds `qdrant` service dependency to synapse-backend
#
# Production docker-compose.yml is unchanged.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  synapse-backend:
    environment:
      # Point at the local qdrant container instead of host.docker.internal:6333
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started

volumes:
  qdrant_data:
