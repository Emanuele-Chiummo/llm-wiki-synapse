# Synapse Docker Compose — PRODUCTION profile (TrueNAS / homelab)
#
# Synapse is a CLIENT/SERVER app (not a self-contained desktop app): the web/PWA/Tauri
# UI is a thin client that talks to this FastAPI backend over HTTP. Launching the UI
# alone does nothing until this backend stack is up.
#
# SERVICES DEFINED HERE:
#   - synapse-backend: FastAPI app (builds from backend/) — includes all M6 endpoints
#   - postgres: PostgreSQL 16 (single vault data)
#   NO frontend service here (production serves the built UI separately / behind a proxy).
#
# For a ONE-COMMAND FULL STACK on your Mac (frontend + backend + postgres + qdrant),
# use the dev override instead — it adds a Qdrant container + the Vite frontend:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up     (or: make dev)
#
# EXTERNAL SERVICES (already running on TrueNAS — I9):
#   - Ollama (RTX 3060): http://host.docker.internal:11434
#   - bge-m3 embeddings (via Ollama): http://host.docker.internal:11434/api/embeddings
#   - Qdrant: http://host.docker.internal:6333
#   - SearXNG: http://host.docker.internal:8888
#
# These external services are referenced via environment variables; they are NOT
# defined as compose services. This honours invariant I9 (reuse existing infra).
#
# Volumes:
#   - postgres data: named volume postgres_data (for easy backup via docker compose exec)
#   - vault: bind-mounted at $(VAULT_PATH) (default ../vault, see .env)
#
# Startup:
#   docker compose up
#   (Postgres waits for PG to be healthy, backend waits for Postgres, then runs migrations.)
#
# Stop:
#   docker compose down

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 — single source of truth for metadata, links, config, coords
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      # Credentials are driven by .env (B3 — no hardcoded secrets in compose).
      # Defaults match the DATABASE_URL default below so `docker compose up`
      # works out of the box without an .env file.  Override in .env for prod.
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ── Network posture (R13-9 / B3) ─────────────────────────────────────────
    # Postgres is NOT published to the host interface in production.
    # It is reachable only within the compose-internal Docker network
    # (synapse-backend → postgres on the Docker bridge).
    # For temporary interactive debugging (e.g. `psql` from the host), uncomment:
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Synapse FastAPI backend — watcher + ingest + REST API
  # ─────────────────────────────────────────────────────────────────────────
  synapse-backend:
    # ── R12-3: Server release channel ──────────────────────────────────────────────
    # For local development: build from source (below).
    # For TrueNAS server deployment: swap the 'build:' block for the 'image:' line below
    # to pull the latest backend image from GHCR. This enables Watchtower auto-updates
    # (when the autoupdate profile is enabled).
    # image: ghcr.io/emanuele-chiummo/llm-wiki-synapse-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: dev
    labels:
      # Watchtower auto-update label: enables backend-only updates (R12-3, AC-R12-3-6).
      # Postgres and Qdrant do NOT carry this label (data services must never be auto-updated).
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      # Database (postgres service above).
      # Use ${DATABASE_URL:-...} so the full URL can be overridden from .env
      # without needing to update individual credential variables here.
      # Default matches the postgres service defaults above.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://synapse:synapse@postgres:5432/synapse}

      # Qdrant (external TrueNAS service — I9, not containerized)
      # Reference via docker host gateway or Tailscale IP
      QDRANT_URL: http://host.docker.internal:6333
      # QDRANT_API_KEY: (optional) Set if your Qdrant requires authentication (OPS-DATA-1).
      # QDRANT_API_KEY: your-qdrant-api-key-here
      QDRANT_COLLECTION: synapse_pages

      # Embedding service: bge-m3 via Ollama on TrueNAS (I9, not containerized)
      # This service runs on the RTX 3060 GPU on TrueNAS.
      EMBEDDING_URL: http://host.docker.internal:11434/api/embeddings
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_DIM: "1024"  # ADR-0004: verify against live service

      # System self-update (R12-3, B1): the backend pokes Watchtower's HTTP API to pull + recreate
      # every labelled container. Both must match the watchtower service below. The TOKEN defaults
      # empty ⇒ update_supported=false ⇒ the UI hides the "Update system" button until you set it.
      WATCHTOWER_URL: ${WATCHTOWER_URL:-http://watchtower:8080}
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:-}

      # Generative Ollama base URL for the Local InferenceProvider (F17, I9 — NB-5).
      # Same Ollama instance, used for analyze/generate (e.g. qwen2.5). External, not containerized.
      OLLAMA_URL: http://host.docker.internal:11434

      # SearXNG web search backend (external TrueNAS service — I9, not containerized).
      # Optional here: can also be configured at runtime in Settings → Web Search.
      # Deep Research returns 503 until a URL is available (env here, or DB via the UI).
      SEARXNG_URL: ${SEARXNG_URL:-}

      # ── Inference provider authentication (F17, ADR-0042) ───────────────────────────────
      # Choose ONE of these three auth methods — they are mutually exclusive:
      #
      # 1. ANTHROPIC_API_KEY (billed, per-token cost):
      #    Use for API provider (Anthropic Messages API) or CLI provider.
      #    Caveat: if ANTHROPIC_API_KEY is set (even to empty), it takes PRECEDENCE
      #    and forces per-token billing. Must be UNSET for subscription auth to work.
      #
      # 2. CLAUDE_CODE_OAUTH_TOKEN (subscription mode, $0 marginal cost):
      #    Use for CLI provider with Pro/Max subscription. Obtained via `claude setup-token`
      #    on the host; a 1-year OAuth token printed once (sk-ant-oat01-...).
      #    Requires ANTHROPIC_API_KEY to be UNSET for this to take effect.
      #
      # 3. CLAUDE_CODE_USE_SUBSCRIPTION (ambient auth, subscription mode):
      #    Alternative flag for subscription auth; works if host login is mounted.
      #    Requires ANTHROPIC_API_KEY to be UNSET.
      #
      # Set these in .env. NEVER commit real credentials.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CODE_USE_SUBSCRIPTION: ${CLAUDE_CODE_USE_SUBSCRIPTION:-}

      # ── REST API trust boundary (ADR-0052 / ADR-0075) ───────────────────────
      # Use server mode for every LAN, tunnel, reverse-proxy or hosted deployment.
      # Server mode fails startup unless SYNAPSE_AUTH_TOKEN is strong and non-empty.
      SYNAPSE_DEPLOYMENT_MODE: ${SYNAPSE_DEPLOYMENT_MODE:-local}
      SYNAPSE_AUTH_TOKEN: ${SYNAPSE_AUTH_TOKEN:-}

      # Vault identity and path
      VAULT_ID: default
      VAULT_PATH: /vault

      # Force the OVERVIEW note language (F3) regardless of content language.
      # Content here is English (ServiceNow docs) but the reader wants an Italian overview.
      OVERVIEW_LANGUAGE: ${OVERVIEW_LANGUAGE:-it}

      # ── Feature U / S bounds (ADR-0020 §2.4 / §4.4) — all I7 caps, env-configurable ──
      MAX_UPLOAD_BYTES: "26214400"     # 25 MB upload cap (Feature U)
      IMPORT_SCAN_MAX_FILES: "200"     # per-scan file cap (Feature S, I7)
      IMPORT_SCAN_MAX_SECONDS: "60"    # per-scan wall-clock cap (Feature S, I7)

      # ── Remote MCP over HTTP (Feature A, ADR-0029) — optional ──────────────────────
      # Bearer token for /mcp/server. When unset, HTTP MCP NOT mounted (fail-closed).
      # Set at deploy time via env var; never commit a real value.
      # Example: export MCP_AUTH_TOKEN="$(openssl rand -base64 32)" before docker compose up
      # In .env: MCP_AUTH_TOKEN=<your-token> (or leave unset to disable HTTP MCP)
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      # Allow write_page over remote MCP surface (default false = read-only).
      MCP_REMOTE_WRITE_ENABLED: ${MCP_REMOTE_WRITE_ENABLED:-false}

      # ── R12-5: Marker PDF extractor microservice (ADR-0051, optional profile) ────────
      # Set to http://marker:8555 when the marker profile is enabled.
      # Otherwise, uses the host default (host.docker.internal:8555 in Docker, localhost:8555 in local dev).
      MARKER_SERVICE_URL: ${MARKER_SERVICE_URL:-http://host.docker.internal:8555}

    # Mount vault (contains raw/sources/ for watcher, wiki/ for output)
    # ── Feature S (ADR-0020): scheduled folder import ─────────────────────────
    # Mount any host folder you want Synapse to auto-import into the container,
    # then set the schedule's source_dir to the CONTAINER path (e.g. /import).
    # The backend can ONLY see mounted paths — there is no host filesystem browse.
    # Example (uncomment + adjust the host side to your folder):
    # - ./import:/import:ro          # read-only is recommended: Synapse copies OUT of it
    volumes:
      - ./vault:/vault
      - ./import:/import:ro

    ports:
      # Loopback-safe by default. Set SYNAPSE_BIND_HOST=0.0.0.0 only together
      # with SYNAPSE_DEPLOYMENT_MODE=server and a strong auth token (ADR-0075).
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:8000:8000"

    # Wait for Postgres to be ready
    depends_on:
      postgres:
        condition: service_healthy

    # Pre-start: run Alembic migrations (I8 — ensures schema is current)
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/status')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Marker PDF extractor microservice — optional profile (disabled by default)
  # ─────────────────────────────────────────────────────────────────────────
  # R12-5: High-quality vision-model PDF extraction via marker-pdf (ADR-0051).
  # Exposes POST /convert (multipart PDF → markdown + page count) and GET /health.
  #
  # Enable with:
  #   docker compose --profile marker up -d
  #
  # When enabled, the backend uses this service for PDF extraction if PDF_EXTRACTOR=marker
  # is set in .env. On any network error or timeout, the backend falls back to pypdf.
  # Models (torch, surya, marker weights) are cached in the marker_models volume.
  #
  # ── GPU support (TrueNAS RTX 3060) ────────────────────────────────────────────
  # To enable GPU acceleration (CUDA), uncomment the deploy block below and set
  # TORCH_DEVICE=cuda in .env. GPU support is optional — CPU-only mode works fine
  # for small to medium PDFs (seconds to minutes per page).
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ IMPORTANT: Uncommenting the GPU block on a host without nvidia-docker   │
  # │ runtime will break `docker compose up` (Compose fails if the requested  │
  # │ resource is unavailable). Leave it commented unless your host has GPU   │
  # │ support explicitly configured.                                          │
  # └─────────────────────────────────────────────────────────────────────────┘
  marker:
    # ── For local dev: build from source ───────────────────────────────────
    # For TrueNAS server: swap 'build:' for the 'image:' line below.
    build:
      context: ./tools/marker-converter
      dockerfile: Dockerfile
      args:
        APP_VERSION: dev
    # For GHCR deployment (R12-5): pull pre-built image (disable build: above)
    # image: ghcr.io/emanuele-chiummo/llm-wiki-synapse-marker:latest
    labels:
      # Watchtower auto-update label (R12-3): marker joins the backend in the update set so
      # POST /ops/system-update (or the hourly poll) refreshes it too. Data services never carry it.
      com.centurylinklabs.watchtower.enable: "true"
    profiles:
      - marker
    environment:
      # Torch device: CPU by default. Set to 'cuda' on GPU host (TrueNAS RTX 3060).
      # If GPU is not available the backend silently falls back to CPU at runtime.
      TORCH_DEVICE: ${TORCH_DEVICE:-}
    volumes:
      # Cache for downloaded model weights (torch, surya, marker PDFs).
      # Persists across container restarts; downloaded only once.
      - marker_models:/models
    ports:
      # Bind to SYNAPSE_BIND_HOST (default 127.0.0.1 — loopback only).
      # For remote access (e.g., multi-host TrueNAS setup), set SYNAPSE_BIND_HOST=0.0.0.0
      # and protect via network policy. Token auth (MARKER_SERVICE_TOKEN) is recommended
      # for any multi-host exposure (SEC-OPS-1).
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:8555:8555"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8555/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

    # ┌─────────────────────────────────────────────────────────────────────────┐
    # │ NVIDIA GPU SUPPORT (TrueNAS RTX 3060 with CUDA) — COMMENTED OUT ────────│
    # │ Uncomment this block ONLY if your host has nvidia-docker runtime        │
    # │ installed and configured. On hosts without GPU support, leaving this    │
    # │ commented ensures the container runs on CPU (slower but functional).    │
    # │                                                                          │
    # │ To enable GPU on TrueNAS SCALE:                                         │
    # │   1. Ensure nvidia-docker is installed (TrueNAS Apps subsystem)         │
    # │   2. Set TORCH_DEVICE=cuda in .env                                      │
    # │   3. Uncomment the deploy block below                                   │
    # │   4. Run: docker compose --profile marker up -d                         │
    # │                                                                          │
    # │ If you uncomment this on a non-GPU host, docker compose will fail.      │
    # └─────────────────────────────────────────────────────────────────────────┘
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [compute, utility]

  # ─────────────────────────────────────────────────────────────────────────
  # Whisper AV transcription microservice — optional profile (disabled by default)
  # ─────────────────────────────────────────────────────────────────────────
  # R13-10 / T8 / F12: faster-whisper (CPU/CUDA) AV transcription at port 8666.
  # Exposes POST /transcribe (multipart "file" → text/language/duration) and GET /health.
  # The backend calls this when AV_TRANSCRIPTION_ENABLED=true; on any error it falls back
  # to the extract.py placeholder — this service is opt-in and never a hard dependency.
  #
  # Enable with:
  #   docker compose --profile av up -d
  #
  # When enabled, set in .env (or synapse-backend environment above):
  #   AV_TRANSCRIPTION_ENABLED=true
  #   WHISPER_SERVICE_URL=http://whisper:8666
  #
  # ── GPU support (TrueNAS RTX 3060) ────────────────────────────────────────────
  # To enable GPU acceleration (CUDA), uncomment the deploy block below and set
  # WHISPER_DEVICE=cuda in .env. CPU-only mode (default) works without changes.
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ IMPORTANT: Uncommenting the GPU block on a host without nvidia-docker   │
  # │ runtime will break `docker compose up`. Leave it commented unless your  │
  # │ host has GPU support explicitly configured.                             │
  # └─────────────────────────────────────────────────────────────────────────┘
  whisper:
    build:
      context: ./tools/whisper-service
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        # Install faster-whisper (Linux/CUDA cross-platform path; mlx-whisper is macOS-only)
        RUN pip install --no-cache-dir faster-whisper fastapi "uvicorn[standard]" python-multipart
        COPY service.py .
        ENV HF_HOME=/models
        EXPOSE 8666
        HEALTHCHECK --interval=10s --timeout=5s --retries=3 --start-period=60s \
          CMD python -c "import urllib.request; urllib.request.urlopen('http://localhost:8666/health')"
        CMD ["python", "service.py", "--port", "8666"]
    profiles:
      - av
    environment:
      # Whisper model — default large-v3 (~3 GB, downloaded on first use to /models).
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      # Compute device: cpu (default) or cuda (requires nvidia-docker; see GPU block below).
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
    volumes:
      # Cache for downloaded Whisper model weights (persists across container restarts).
      - whisper_models:/models
    ports:
      # Bind to SYNAPSE_BIND_HOST (default 127.0.0.1 — loopback only).
      # Token auth (WHISPER_SERVICE_TOKEN, optional) recommended for multi-host exposure.
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:8666:8666"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8666/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

    # ┌─────────────────────────────────────────────────────────────────────────┐
    # │ NVIDIA GPU SUPPORT (TrueNAS RTX 3060 with CUDA) — COMMENTED OUT ────────│
    # │ Uncomment this block ONLY if your host has nvidia-docker runtime        │
    # │ installed and configured. On hosts without GPU support, leaving this    │
    # │ commented ensures the container runs on CPU (slower but functional).    │
    # │                                                                          │
    # │ To enable GPU on TrueNAS SCALE:                                         │
    # │   1. Ensure nvidia-docker is installed (TrueNAS Apps subsystem)         │
    # │   2. Set WHISPER_DEVICE=cuda in .env                                    │
    # │   3. Uncomment the deploy block below                                   │
    # │   4. Run: docker compose --profile av up -d                             │
    # │                                                                          │
    # │ If you uncomment this on a non-GPU host, docker compose will fail.      │
    # └─────────────────────────────────────────────────────────────────────────┘
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [compute, utility]

  # ─────────────────────────────────────────────────────────────────────────
  # Watchtower — optional auto-update service (disabled by default)
  # ─────────────────────────────────────────────────────────────────────────
  # R12-3: Auto-update service, disabled by default via Compose profile.
  # To enable zero-touch backend updates on TrueNAS, run:
  #   docker compose --profile autoupdate up -d
  # Watchtower will poll the container registry hourly and update any service
  # with the label `com.centurylinklabs.watchtower.enable=true` (synapse-backend + marker).
  # Postgres, Qdrant and other data services are never touched (no label).
  #
  # --http-api-update exposes POST /v1/update (Bearer WATCHTOWER_HTTP_API_TOKEN) so the app's
  # "Update system" button (POST /ops/system-update — R12-3 B1) can trigger a pull + recreate on
  # demand; --http-api-periodic-polls keeps the hourly schedule ALSO active. The backend reaches it
  # at http://watchtower:8080 on the compose network (no host port needed).
  # See docs/DEPLOY.md §Updating Synapse for details.
  watchtower:
    image: containrrr/watchtower:latest
    profiles:
      - autoupdate
    environment:
      # Shared secret for the HTTP API — must match WATCHTOWER_HTTP_API_TOKEN on synapse-backend.
      # Empty ⇒ the API rejects requests and the app keeps the update button hidden. Set a strong
      # value (e.g. `openssl rand -hex 32`).
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >
      --interval 3600
      --label-enable
      --http-api-update
      --http-api-periodic-polls
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  marker_models:
    driver: local
  whisper_models:
    driver: local
