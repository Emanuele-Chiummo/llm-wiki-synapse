name: Desktop release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write
  packages: write

# Never run two release builds for the same ref at once (tag push + manual
# dispatch can overlap); queue instead of cancel — releases must complete.
concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # R12-3: Build and push backend image to GHCR
  # ──────────────────────────────────────────────────────────────────────────
  # On every vX.Y.Z tag, build the backend Docker image and push to
  # ghcr.io/emanuele-chiummo/llm-wiki-synapse-backend with both vX.Y.Z and latest tags.
  # This job runs in parallel with the desktop build matrix (no dependencies).
  # CI passes --build-arg APP_VERSION={tag} so the backend reports its version at runtime.
  backend-image:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          # github.ref_name is the tag name (e.g. v1.2.0)
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Docker requires lowercase repository names; the GitHub owner is mixed-case.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ steps.version.outputs.owner }}/llm-wiki-synapse-backend:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.owner }}/llm-wiki-synapse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Build and push frontend image to GHCR
  # ──────────────────────────────────────────────────────────────────────────
  # On every vX.Y.Z tag, build the production frontend image (Vite static bundle
  # served by nginx, which reverse-proxies API paths to the backend) and push to
  # ghcr.io/emanuele-chiummo/llm-wiki-synapse-frontend with both vX.Y.Z and latest.
  # Runs in parallel with backend-image / marker-image / the desktop build matrix.
  frontend-image:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Docker requires lowercase repository names; the GitHub owner is mixed-case.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.owner }}/llm-wiki-synapse-frontend:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.owner }}/llm-wiki-synapse-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # R12-5: Build and push Marker image to GHCR
  # ──────────────────────────────────────────────────────────────────────────
  # On every vX.Y.Z tag, build the Marker microservice image and push to
  # ghcr.io/emanuele-chiummo/llm-wiki-synapse-marker with both vX.Y.Z and latest tags.
  # This job runs in parallel with the backend-image and desktop build matrix.
  # WARNING: torch is heavy; uses pip cache mount to speed up repeated builds.
  marker-image:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Docker requires lowercase repository names; the GitHub owner is mixed-case.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push marker image
        uses: docker/build-push-action@v7
        with:
          context: ./tools/marker-converter
          file: ./tools/marker-converter/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ steps.version.outputs.owner }}/llm-wiki-synapse-marker:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.owner }}/llm-wiki-synapse-marker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    strategy:
      matrix:
        include:
          # Native builds per runner: macos-latest is Apple Silicon (aarch64),
          # windows-latest is x86_64. No cross-compilation.
          - runner: macos-latest
            artifact: synapse-macos-arm64
          - runner: windows-latest
            artifact: synapse-windows-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (npm)
        run: npm ci --prefix frontend

      # ADR-0049: unified v* release channel. tauri-action runs from the repo
      # root (src-tauri lives there; `npm --prefix` would break CLI project
      # detection). On v* tags it creates/updates the release and attaches
      # bundles + signed updater artifacts + latest.json (includeUpdaterJson).
      # workflow_dispatch = build-only (empty tagName -> no release).
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: node frontend/node_modules/@tauri-apps/cli/tauri.js
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Portable Windows build: the raw, self-contained Tauri executable (the whole
      # frontend is embedded). No installer, no registry — runs from any folder / USB
      # stick; only needs the WebView2 runtime (present on Win10 21H2+/Win11). Does NOT
      # auto-update (that path belongs to the NSIS installer). Windows runner + v* tag only.
      - name: Publish portable Windows exe
        if: matrix.runner == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="src-tauri/target/release/Synapse.exe"
          if [ ! -f "$SRC" ]; then
            SRC=$(find src-tauri/target/release -maxdepth 1 -name '*.exe' | head -1)
          fi
          OUT="Synapse-${VERSION}-portable-x64.exe"
          cp "$SRC" "$OUT"
          ls -lh "$OUT"
          gh release upload "${GITHUB_REF_NAME}" "$OUT" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/
          retention-days: 7

  # Package Chrome MV3 extension as a zip artifact (lightweight job, runs on ubuntu).
  # On v* tags, attaches the zip to the GitHub release. On workflow_dispatch, uploads
  # as an artifact only.
  package-clipper:
    # needs: the release is created by tauri-action in the build matrix; attaching
    # before it exists fails with "release not found" (observed on v0.9.0).
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate extension manifest
        working-directory: extension
        run: |
          python3 << 'VALIDATE_EOF'
          import json
          import sys
          
          # Load and validate manifest (CWD = extension/, so manifest-relative
          # paths like icons/icon-16.png resolve correctly with os.path.exists)
          try:
            with open('manifest.json', 'r') as f:
              manifest = json.load(f)
            
            # Check required fields
            assert manifest.get('manifest_version') == 3, "Must be MV3"
            assert 'name' in manifest, "Missing 'name'"
            assert 'version' in manifest, "Missing 'version'"
            assert 'action' in manifest, "Missing 'action'"
            assert 'permissions' in manifest, "Missing 'permissions'"
            assert 'host_permissions' in manifest, "Missing 'host_permissions'"
            
            # Check all referenced files exist
            import os
            errors = []
            
            # Check icons
            if 'default_icon' in manifest.get('action', {}):
              icons = manifest['action']['default_icon']
              if isinstance(icons, dict):
                for size, path in icons.items():
                  if not os.path.exists(path):
                    errors.append(f"Missing icon: {path}")
            
            # Check HTML files
            for html_key in ['default_popup', 'options_page']:
              if html_key in manifest.get('action', {}):
                path = manifest['action'][html_key]
                if not os.path.exists(path):
                  errors.append(f"Missing HTML: {path}")
              elif html_key == 'options_page' and html_key in manifest:
                path = manifest[html_key]
                if not os.path.exists(path):
                  errors.append(f"Missing HTML: {path}")
            
            if errors:
              for err in errors:
                print(f"✗ {err}")
              sys.exit(1)
            
            print(f"✓ Manifest valid (v{manifest['version']})")
            print(f"✓ All referenced files exist")
            
          except json.JSONDecodeError as e:
            print(f"✗ Invalid JSON: {e}")
            sys.exit(1)
          except AssertionError as e:
            print(f"✗ Manifest error: {e}")
            sys.exit(1)
          except Exception as e:
            print(f"✗ Validation error: {e}")
            sys.exit(1)
          VALIDATE_EOF

      - name: Create extension zip
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          ZIP_NAME="synapse-clipper-${VERSION}.zip"
          
          cd extension
          zip -r "../${ZIP_NAME}" \
            manifest.json \
            popup.html popup.js \
            options.html options.js \
            icons/ \
            vendor/ \
            README.md \
            -x "*.git*" "__pycache__/*" "*.pyc" "node_modules/*"
          
          cd ..
          ls -lh "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload clipper artifact
        uses: actions/upload-artifact@v7
        with:
          name: synapse-clipper
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Attach clipper to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload "${{ github.ref_name }}" "${{ env.ZIP_NAME }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
