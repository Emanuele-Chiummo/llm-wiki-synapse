name: Desktop release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # Native builds per runner: macos-latest is Apple Silicon (aarch64),
          # windows-latest is x86_64. No cross-compilation.
          - runner: macos-latest
            artifact: synapse-macos-arm64
          - runner: windows-latest
            artifact: synapse-windows-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (npm)
        run: npm ci --prefix frontend

      # ADR-0049: unified v* release channel. tauri-action runs from the repo
      # root (src-tauri lives there; `npm --prefix` would break CLI project
      # detection). On v* tags it creates/updates the release and attaches
      # bundles + signed updater artifacts + latest.json (includeUpdaterJson).
      # workflow_dispatch = build-only (empty tagName -> no release).
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: node frontend/node_modules/@tauri-apps/cli/tauri.js
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
