name: CI — Lint, Unit Tests, Docs Gate

on:
  push:
    branches:
      - sprint/**
      - main
  pull_request:
    branches:
      - sprint/**
      - main

# Cancel superseded runs on the same ref (QA-CI-2, 1.9.0 W1): a force-push or a
# rapid follow-up commit obsoletes the previous run. main is never cancelled
# (docs-deploy must complete).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# File-level least-privilege default (1.9.1 W4, SEC-DEPS-1): read-only GITHUB_TOKEN unless
# a job explicitly needs more. `docs-deploy` already declares its own job-level
# `permissions: contents: write` (required to push to gh-pages) — job-level permissions
# override this file-level default, so that job is unaffected by this change.
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Stage 1: Lint & Format checks (ruff, black, eslint)
  # Runs service-free. Failure blocks merge.
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # QA-DEBT-1 guard (1.9.0 W1): the repo lives in an iCloud-synced folder that
      # keeps spawning "name 2.ext" conflict duplicates. .gitignore blocks them from
      # being ADDED, but a `git add --force` / rename slip would still land one —
      # this step keeps the class extinct in the tracked tree.
      - name: Junk-file guard (iCloud "name N.ext" duplicates)
        run: |
          if git ls-files | grep -E ' [0-9]+(\.[^/]*)?(/|$)'; then
            echo "::error::iCloud duplicate junk files are tracked (pattern 'name N.ext'). Delete them."
            exit 1
          fi
          echo "No junk duplicates tracked."

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Ruff check
        working-directory: backend
        run: ruff check app tests

      - name: Black format check
        working-directory: backend
        run: black --check app tests

      # BE-ARCH-4 (1.9.2 W2): import-graph layer boundaries (models -> persistence
      # -> services -> routers/mcp -> main). Baseline is clean (0 violations, one
      # documented `ignore_imports` exception — see pyproject.toml comments) so
      # this is BLOCKING: any new commit that regresses a layer boundary fails CI.
      - name: Import-linter (layer boundaries)
        working-directory: backend
        run: lint-imports --config pyproject.toml

  # ──────────────────────────────────────────────────────────────────────
  # Stage 2: Docker build validation
  # Validates that the Dockerfile builds without errors. Catches issues like:
  # - Missing files (alembic.ini, app/, etc.)
  # - Bad COPY/ADD statements
  # - Broken dependencies
  # No live services required. Builds the image and discards it.
  # Runs service-free. Failure blocks merge.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build (backend image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: synapse-backend:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose.yml syntax
        run: docker compose config > /dev/null
        env:
          # Suppress warnings about missing .env file; compose config only validates syntax
          COMPOSE_IGNORE_ORPHANS: "true"

  # ──────────────────────────────────────────────────────────────────────
  # Stage 3: Type checking (mypy)
  # Runs service-free. Failure blocks merge.
  # ──────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: mypy strict mode
        working-directory: backend
        run: mypy app

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4: Unit tests (pytest — infra-free subset)
  # Runs service-free. Failure blocks merge.
  # Tests use FakeEmbeddingClient and dummy env (conftest setup).
  # ──────────────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Alembic single-head check
        # Ensures the migration graph has exactly one head (no divergent branches).
        # `alembic heads` reads migration files only — no live DB required.
        # Fail-fast: a split head means a merge conflict was resolved incorrectly.
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11434/api/embeddings
          EMBEDDING_DIM: "1024"
        run: |
          head_count=$(python -m alembic heads 2>/dev/null | grep -c "(head)" || true)
          if [ "$head_count" -ne 1 ]; then
            echo "::error::Alembic has ${head_count} heads — exactly 1 required. Run 'alembic heads' locally to inspect."
            python -m alembic heads 2>/dev/null || true
            exit 1
          fi
          echo "Alembic single-head check passed (${head_count} head)."

      - name: pytest (infra-free tests)
        working-directory: backend
        run: python -m pytest -q

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4a: Dependency vulnerability audit (1.9.1 W4, SEC-DEPS-1)
  # REPORT-ONLY (non-blocking): `continue-on-error: true` on both audit steps.
  # Rationale: several transitive deps in this project (igraph/fa2_modified native
  # extensions, older FastAPI/Starlette pins, etc.) sometimes carry advisories with no
  # available fix yet, or where the fix requires a coordinated major-version bump that is
  # its own separate PR. Making this job blocking on day one would turn CI red on unrelated
  # PRs for issues no single commit can fix, training everyone to ignore the gate. Instead:
  # this job ALWAYS reports (uploaded as an artifact, visible in the Actions summary even on
  # a clean run) so vulnerabilities are visible and can be triaged deliberately, without
  # blocking the merge train. Revisit blocking mode once the backlog is at a steady baseline.
  # ──────────────────────────────────────────────────────────────────────
  security-audit:
    name: Dependency Audit (pip-audit + npm audit) — report-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"
          pip install pip-audit

      - name: pip-audit (backend) — report-only
        working-directory: backend
        continue-on-error: true
        run: pip-audit --desc -f json -o pip-audit-report.json || pip-audit --desc

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (frontend) — report-only
        working-directory: frontend
        continue-on-error: true
        run: npm audit --json > npm-audit-report.json || npm audit

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json
          retention-days: 30
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4b: Frontend tests (vitest, typecheck, eslint)
  # Runs service-free. Failure blocks merge.
  # Tests use jsdom. Validates TypeScript and ESLint rules.
  # ──────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (vitest + TypeScript + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Prettier format check
        working-directory: frontend
        run: npm run format:check

      - name: vitest
        working-directory: frontend
        run: npm run test

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4c: E2E Tests (Playwright) — integration test with live services
  # Spins up postgres:16 + qdrant + fake-embeddings stub via docker-compose.ci.yml;
  # starts backend + frontend in-process (not containerized for fast iteration);
  # runs the 8 Playwright E2E specs (frontend/e2e/*.spec.ts).
  # Separate job so unit/lint jobs stay fast; continue-on-error: false.
  # ──────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright + Docker services)
    runs-on: ubuntu-latest
    # Setup alone (compose pull/up + pip + npm ci + vite build + Playwright
    # browser download) takes ~12-13 min on a cold runner; 15 killed the suite
    # mid-run (job timeout surfaces as "cancelled", not "failed").
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start services (docker-compose.ci.yml)
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for services to be healthy
        run: |
          set +e
          # Health checks rely on exit codes, not on parsing human-readable
          # output: pg_isready's message format is "host:port - accepting
          # connections" (not stable to string-compare), and Qdrant serves
          # /healthz (plain 200) — /health does not exist (404).
          for i in {1..60}; do
            ok=1
            docker compose -f docker-compose.ci.yml exec -T postgres pg_isready -U synapse -d synapse >/dev/null 2>&1 || ok=0
            curl -sf http://localhost:6333/healthz >/dev/null || ok=0
            curl -sf http://localhost:11435/health >/dev/null || ok=0

            if [ "$ok" -eq 1 ]; then
              echo "All services are healthy"
              exit 0
            fi

            echo "Waiting for services... (attempt $i/60)"
            sleep 1
          done
          echo "Services failed to start within 60 seconds"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11435/api/embeddings
          EMBEDDING_DIM: "1024"
          VAULT_PATH: /tmp/synapse-test-vault
          VAULT_ID: test
        run: |
          cd backend
          python -m alembic upgrade head

      # ── E2E fixture seeding ──────────────────────────────────────────────────
      # Runs AFTER migrations (schema must exist) and BEFORE backend (uvicorn
      # connects to the same DB; seeding must complete before specs run).
      # All three seed scripts are idempotent: re-running is safe.

      - name: Seed demo vault (140-node Barabási–Albert graph)
        # Produces 140 pages (demo/ prefix) + directed links + ~10 ingest_run rows.
        # shell-m4-phase1.spec.ts prereq: "140-node demo graph seeded".
        # shell-m4-phase2.spec.ts prereq: "10 demo ingest runs seeded".
        # vault_id=test matches VAULT_ID used by the backend in CI.
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
        run: |
          cd backend
          python scripts/seed_demo_vault.py --nodes 140 --vault-id test

      - name: Seed graph performance fixture (200 nodes, 500 edges)
        # Produces 200 pages (fixture/ prefix) with pre-computed x/y coords +
        # 500 weighted edges. graph-perf.spec.ts (G2/G4) uses this data.
        # demo/ and fixture/ paths are disjoint — both seeds coexist in vault 'test'.
        # Node-count assertions in specs check virtualisation (<100 rendered rows),
        # not exact totals, so the combined 340-node graph does not break any test.
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
        run: |
          cd backend
          python scripts/seed_graph_fixture.py --nodes 200 --edges 500 --vault-id test

      - name: Seed E2E extras (provider_config + conversations)
        # Adds rows that seed_demo_vault.py and seed_graph_fixture.py omit:
        #   - provider_config: scope=operation, operation=chat, vault_id=test,
        #     provider_type=local, model_id=qwen2.5:3b
        #     (required by shell-m4-phase3-chat.spec.ts "chat provider_config seeded")
        #   - 4 conversations with 2 messages each for vault_id=test
        #     (required by shell-m4-phase3-chat.spec.ts "backend has 4+ seeded conversations")
        # The Alembic migration 0002 already seeds 2 global provider_config rows
        # (api/claude-sonnet-4-6 + api/claude-haiku-4-5-20251001); this step only
        # adds the operation-scoped chat row the migration does not create.
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
        run: |
          cd backend
          python scripts/seed_e2e_extras.py --vault-id test

      - name: Seed vault filesystem (sources listing)
        # The Sources view lists raw/sources/ from DISK (not the DB): without
        # files the tree renders its empty state and the SORGENTI specs fail.
        # Pre-placing files is safe: the watcher reacts to new events only
        # (no startup rescan — ADR-0006/I1), so nothing gets ingested.
        run: |
          mkdir -p /tmp/synapse-test-vault/raw/sources
          for i in 1 2 3 4 5; do
            printf '# Seed source %s\n' "$i" > /tmp/synapse-test-vault/raw/sources/seed-source-$i.md
          done

      - name: Start backend (uvicorn)
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11435/api/embeddings
          EMBEDDING_DIM: "1024"
          VAULT_PATH: /tmp/synapse-test-vault
          VAULT_ID: test
        run: |
          cd backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          # App import (igraph, providers, routers) can take >3s on a cold
          # runner — retry for up to 60s instead of a fixed sleep. The probe
          # is /status: the app has no /health route (only /status and
          # /health/detailed, both auth-exempt).
          for i in {1..60}; do
            if curl -sf http://localhost:8000/status >/dev/null; then
              echo "Backend is up (after ${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 60 seconds"
          cat /tmp/backend.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # VITE_API_BASE is INLINED AT BUILD TIME (import.meta.env) — it must
          # be set here, not on the preview step, or the bundle ships with a
          # relative base and every browser API call 404s against :5173.
          VITE_API_BASE: http://localhost:8000
          # The UI's vault id is also build-time inlined (no runtime sync from
          # /status): it must match the backend's VAULT_ID=test or the
          # conversation list queries the wrong vault and shows nothing.
          VITE_DEFAULT_VAULT_ID: test
        run: npm run build

      - name: Start frontend (vite preview)
        working-directory: frontend
        run: |
          npm run preview -- --host 127.0.0.1 --port 5173 > /tmp/frontend.log 2>&1 &
          sleep 3
          # Verify frontend is up
          curl -f http://localhost:5173/ || {
            cat /tmp/frontend.log
            exit 1
          }

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          SYNAPSE_BACKEND_URL: http://localhost:8000
          SYNAPSE_FRONTEND_URL: http://localhost:5173
          # GH runners have no GPU: WebGL runs on SwiftShader, so the G2
          # longtask gate would measure the software rasterizer, not the
          # product. The strict gate runs on real-hardware manual sessions.
          E2E_SOFTWARE_GL: "1"
        # No --reporter override: the CLI flag REPLACES (not merges with) the config's
        # reporter array, which is why `playwright-report/` — the only path the next
        # step uploads — was always empty on failure. playwright.config.ts already
        # configures both "list" (console output, same as before) and "html" (the
        # artifact this step uploads), so dropping the override fixes the upload
        # without changing the console output CI shows.
        run: npx playwright test e2e/

      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          # test-results/ holds the raw per-test trace.zip files (the html report links
          # to them but doesn't embed them) — upload both so a failure can actually be
          # inspected with `npx playwright show-trace`.
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down
          pkill -f "uvicorn app.main:app" || true
          pkill -f "vite preview" || true

  # ──────────────────────────────────────────────────────────────────────
  # Stage 5: Docs gate (I8 — ER diagram, OpenAPI auto-gen, Mermaid validation)
  # Validates that docs/er/schema.mmd and docs/api/openapi.json are
  # up to date with the source (models.py + main.py). Runs mermaid-cli
  # to render-check all architecture, sequences, and ER diagrams.
  # Failure blocks merge (I8 — docs-as-DoD).
  # ──────────────────────────────────────────────────────────────────────
  docs:
    name: Docs Gate (ER + OpenAPI + Mermaid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Generate ER diagram (make er)
        working-directory: backend
        run: python scripts/generate_er.py
        env:
          # Dummy env vars so Settings() doesn't fail
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11434/api/embeddings
          EMBEDDING_DIM: "1024"

      - name: Generate OpenAPI spec (make openapi)
        working-directory: backend
        run: python scripts/generate_openapi.py
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11434/api/embeddings
          EMBEDDING_DIM: "1024"

      - name: Check for docs drift
        run: |
          git diff --exit-code docs/er/schema.mmd || \
            { echo "ER diagram out of date (docs/er/schema.mmd). Run 'make er' and commit."; exit 1; }
          git diff --exit-code docs/api/openapi.json || \
            { echo "OpenAPI spec out of date (docs/api/openapi.json). Run 'make openapi' and commit."; exit 1; }

      # ADR corpus gate (1.9.0 W1, QA-DEBT-2): naming convention, index completeness,
      # dead links, duplicate numbers (the 0067 collision class), missing Status lines.
      - name: Check ADR corpus consistency
        run: python3 scripts/check_adr_index.py

      - name: Install mermaid-cli for diagram validation
        run: npm install -g @mermaid-js/mermaid-cli@11

      - name: Validate Mermaid diagrams
        run: |
          # Puppeteer/Chromium on GitHub runners needs --no-sandbox.
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer.json
          for f in docs/architecture/*.mmd docs/er/*.mmd docs/sequences/*.mmd; do
            [ -f "$f" ] || continue
            echo "Validating $f..."
            mmdc -p /tmp/puppeteer.json -i "$f" -o /tmp/mmdc-check.svg \
              || { echo "Mermaid syntax error in $f"; exit 1; }
          done
          echo "All Mermaid diagrams are valid."

  # ──────────────────────────────────────────────────────────────────────
  # Stage 6: MkDocs Material build (docs site)
  # Builds the documentation site with `mkdocs build --strict`.
  # Catches broken links, missing files, and config errors.
  # Failure blocks merge (strict mode enforcement).
  # Note: Deployment to GitHub Pages requires Pages to be enabled in repo
  # Settings → Pages → Source: GitHub Actions. The build artifact is
  # created here; actual deployment is a separate step (not in v1.0).
  # ──────────────────────────────────────────────────────────────────────
  docs-site:
    name: MkDocs Build (strict mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-swagger-ui-tag

      - name: Build docs site (strict mode)
        run: python -m mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-site
          path: site/
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────
  # Stage 6b: Deploy docs site to GitHub Pages (main only).
  # Pages is enabled repo-side with build_type=workflow (2026-07-03).
  # Site: https://emanuele-chiummo.github.io/llm-wiki-synapse/
  # ──────────────────────────────────────────────────────────────────────
  docs-deploy:
    name: Deploy Docs (GitHub Pages)
    if: github.ref == 'refs/heads/main'
    needs: docs-site
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Pages is configured with source=gh-pages branch (legacy build).
      # The actions-based deploy (deploy-pages@v4) was rejected repeatedly by the
      # Pages backend for this repo ("Deployment failed, try again later"), while
      # mkdocs gh-deploy (canonical MkDocs flow) works: it force-pushes the built
      # site to the gh-pages branch and Pages serves it directly.
      - name: Build and deploy to gh-pages
        run: |
          pip install mkdocs-material mkdocs-swagger-ui-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force

  tauri-build:
    name: Tauri v2 Desktop Bundles
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: synapse-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
          if-no-files-found: warn

