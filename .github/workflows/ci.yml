name: CI — Lint, Unit Tests, Docs Gate

on:
  push:
    branches:
      - sprint/**
      - main
  pull_request:
    branches:
      - sprint/**
      - main

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Stage 1: Lint & Format checks (ruff, black, eslint)
  # Runs service-free. Failure blocks merge.
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Ruff check
        working-directory: backend
        run: ruff check app tests

      - name: Black format check
        working-directory: backend
        run: black --check app tests

  # ──────────────────────────────────────────────────────────────────────
  # Stage 2: Docker build validation
  # Validates that the Dockerfile builds without errors. Catches issues like:
  # - Missing files (alembic.ini, app/, etc.)
  # - Bad COPY/ADD statements
  # - Broken dependencies
  # No live services required. Builds the image and discards it.
  # Runs service-free. Failure blocks merge.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build (backend image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: synapse-backend:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose.yml syntax
        run: docker compose config > /dev/null
        env:
          # Suppress warnings about missing .env file; compose config only validates syntax
          COMPOSE_IGNORE_ORPHANS: "true"

  # ──────────────────────────────────────────────────────────────────────
  # Stage 3: Type checking (mypy)
  # Runs service-free. Failure blocks merge.
  # ──────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: mypy strict mode
        working-directory: backend
        run: mypy app

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4: Unit tests (pytest — infra-free subset)
  # Runs service-free. Failure blocks merge.
  # Tests use FakeEmbeddingClient and dummy env (conftest setup).
  # ──────────────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: pytest (infra-free tests)
        working-directory: backend
        run: python -m pytest -q

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4b: Frontend tests (vitest, typecheck, eslint)
  # Runs service-free. Failure blocks merge.
  # Tests use jsdom. Validates TypeScript and ESLint rules.
  # ──────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (vitest + TypeScript + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: vitest
        working-directory: frontend
        run: npm run test

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4c: E2E Tests (Playwright) — integration test with live services
  # Spins up postgres:16 + qdrant + fake-embeddings stub via docker-compose.ci.yml;
  # starts backend + frontend in-process (not containerized for fast iteration);
  # runs the 8 Playwright E2E specs (frontend/e2e/*.spec.ts).
  # Separate job so unit/lint jobs stay fast; continue-on-error: false.
  # ──────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright + Docker services)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start services (docker-compose.ci.yml)
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for services to be healthy
        run: |
          set +e
          # Health checks rely on exit codes, not on parsing human-readable
          # output: pg_isready's message format is "host:port - accepting
          # connections" (not stable to string-compare), and Qdrant serves
          # /healthz (plain 200) — /health does not exist (404).
          for i in {1..60}; do
            ok=1
            docker compose -f docker-compose.ci.yml exec -T postgres pg_isready -U synapse -d synapse >/dev/null 2>&1 || ok=0
            curl -sf http://localhost:6333/healthz >/dev/null || ok=0
            curl -sf http://localhost:11435/health >/dev/null || ok=0

            if [ "$ok" -eq 1 ]; then
              echo "All services are healthy"
              exit 0
            fi

            echo "Waiting for services... (attempt $i/60)"
            sleep 1
          done
          echo "Services failed to start within 60 seconds"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11435/api/embeddings
          EMBEDDING_DIM: "1024"
          VAULT_PATH: /tmp/synapse-test-vault
          VAULT_ID: test
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Start backend (uvicorn)
        env:
          DATABASE_URL: postgresql+asyncpg://synapse:synapse@localhost:5432/synapse
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11435/api/embeddings
          EMBEDDING_DIM: "1024"
          VAULT_PATH: /tmp/synapse-test-vault
          VAULT_ID: test
        run: |
          cd backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          # App import (igraph, providers, routers) can take >3s on a cold
          # runner — retry /health for up to 60s instead of a fixed sleep.
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "Backend is up (after ${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 60 seconds"
          cat /tmp/backend.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend (vite preview)
        working-directory: frontend
        env:
          VITE_API_BASE: http://localhost:8000
        run: |
          npm run preview -- --host 127.0.0.1 --port 5173 > /tmp/frontend.log 2>&1 &
          sleep 3
          # Verify frontend is up
          curl -f http://localhost:5173/ || {
            cat /tmp/frontend.log
            exit 1
          }

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          SYNAPSE_BACKEND_URL: http://localhost:8000
          SYNAPSE_FRONTEND_URL: http://localhost:5173
        run: npx playwright test e2e/ --reporter=list

      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down
          pkill -f "uvicorn app.main:app" || true
          pkill -f "vite preview" || true

  # ──────────────────────────────────────────────────────────────────────
  # Stage 5: Docs gate (I8 — ER diagram, OpenAPI auto-gen, Mermaid validation)
  # Validates that docs/er/schema.mmd and docs/api/openapi.json are
  # up to date with the source (models.py + main.py). Runs mermaid-cli
  # to render-check all architecture, sequences, and ER diagrams.
  # Failure blocks merge (I8 — docs-as-DoD).
  # ──────────────────────────────────────────────────────────────────────
  docs:
    name: Docs Gate (ER + OpenAPI + Mermaid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install -e ".[dev]"

      - name: Generate ER diagram (make er)
        working-directory: backend
        run: python scripts/generate_er.py
        env:
          # Dummy env vars so Settings() doesn't fail
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11434/api/embeddings
          EMBEDDING_DIM: "1024"

      - name: Generate OpenAPI spec (make openapi)
        working-directory: backend
        run: python scripts/generate_openapi.py
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          QDRANT_URL: http://localhost:6333
          EMBEDDING_URL: http://localhost:11434/api/embeddings
          EMBEDDING_DIM: "1024"

      - name: Check for docs drift
        run: |
          git diff --exit-code docs/er/schema.mmd || \
            { echo "ER diagram out of date (docs/er/schema.mmd). Run 'make er' and commit."; exit 1; }
          git diff --exit-code docs/api/openapi.json || \
            { echo "OpenAPI spec out of date (docs/api/openapi.json). Run 'make openapi' and commit."; exit 1; }

      - name: Install mermaid-cli for diagram validation
        run: npm install -g @mermaid-js/mermaid-cli@11

      - name: Validate Mermaid diagrams
        run: |
          # Puppeteer/Chromium on GitHub runners needs --no-sandbox.
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer.json
          for f in docs/architecture/*.mmd docs/er/*.mmd docs/sequences/*.mmd; do
            [ -f "$f" ] || continue
            echo "Validating $f..."
            mmdc -p /tmp/puppeteer.json -i "$f" -o /tmp/mmdc-check.svg \
              || { echo "Mermaid syntax error in $f"; exit 1; }
          done
          echo "All Mermaid diagrams are valid."

  # ──────────────────────────────────────────────────────────────────────
  # Stage 6: MkDocs Material build (docs site)
  # Builds the documentation site with `mkdocs build --strict`.
  # Catches broken links, missing files, and config errors.
  # Failure blocks merge (strict mode enforcement).
  # Note: Deployment to GitHub Pages requires Pages to be enabled in repo
  # Settings → Pages → Source: GitHub Actions. The build artifact is
  # created here; actual deployment is a separate step (not in v1.0).
  # ──────────────────────────────────────────────────────────────────────
  docs-site:
    name: MkDocs Build (strict mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-swagger-ui-tag

      - name: Build docs site (strict mode)
        run: python -m mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────
  # Stage 6b: Deploy docs site to GitHub Pages (main only).
  # Pages is enabled repo-side with build_type=workflow (2026-07-03).
  # Site: https://emanuele-chiummo.github.io/llm-wiki-synapse/
  # ──────────────────────────────────────────────────────────────────────
  docs-deploy:
    name: Deploy Docs (GitHub Pages)
    if: github.ref == 'refs/heads/main'
    needs: docs-site
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Pages is configured with source=gh-pages branch (legacy build).
      # The actions-based deploy (deploy-pages@v4) was rejected repeatedly by the
      # Pages backend for this repo ("Deployment failed, try again later"), while
      # mkdocs gh-deploy (canonical MkDocs flow) works: it force-pushes the built
      # site to the gh-pages branch and Pages serves it directly.
      - name: Build and deploy to gh-pages
        run: |
          pip install mkdocs-material mkdocs-swagger-ui-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force

  tauri-build:
    name: Tauri v2 Desktop Bundles
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: synapse-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────
  # (Future) Stage 8: Integration tests (optional, manual trigger)
  # Requires live Qdrant, Ollama, PostgreSQL on TrueNAS.
  # Gated behind a condition (allow-failure in v0.1).
  # ──────────────────────────────────────────────────────────────────────
