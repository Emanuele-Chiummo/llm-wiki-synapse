# One-shot maintenance workflow: republish the repository history without
# AI-attribution trailers (manifest: scripts/republish/manifest.json).
#
# What it does, in order:
#   1. Force-pushes the rewritten main. Trees, dates and content are identical
#      to the current main — only commit messages/author metadata differ.
#      main is protected, so the push retries every 60 s for up to 30 minutes:
#      enable  Settings → Branches → main → "Allow force pushes"  while it
#      waits, and disable it again when the workflow finishes.
#   2. Force-moves every tag onto the rewritten history. Annotated tag objects
#      are recreated byte-identically from the manifest. All pushes use
#      GITHUB_TOKEN, whose events never chain other workflows — so moving the
#      48 v* tags cannot trigger desktop-release.yml rebuilds.
#   3. Cleans up the helper branches (zz-ccr-probe, chore/republish-aux) and
#      deletes this trigger branch itself.
#
# Idempotent: re-running after a partial failure is safe. The releases keep
# their assets untouched; they follow the moved tag names automatically.
name: Republish clean history

on:
  push:
    branches: ['chore/republish-clean-history']

permissions:
  contents: write

concurrency: republish-clean-history

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Republish main and tags from the manifest
        run: |
          set -euo pipefail
          M=scripts/republish/manifest.json
          OLD_MAIN=$(jq -r .old_main "$M"); NEW_MAIN=$(jq -r .new_main "$M")
          git fetch origin main
          git fetch origin chore/republish-aux || true
          CUR=$(git rev-parse origin/main)
          if [ "$CUR" = "$NEW_MAIN" ]; then
            echo "main is already republished — continuing with tags"
          elif [ "$CUR" = "$OLD_MAIN" ]; then
            git cat-file -e "$NEW_MAIN^{commit}"
            echo "::notice::Force-pushing the rewritten main. If rejected, enable Settings → Branches → main → 'Allow force pushes' now — this step retries every 60 s for 30 minutes. Disable the toggle again once the workflow is green."
            ok=0
            for i in $(seq 1 30); do
              if git push --force origin "$NEW_MAIN:refs/heads/main"; then ok=1; break; fi
              echo "attempt $i/30 rejected — waiting 60 s (enable 'Allow force pushes' on main)"
              sleep 60
            done
            if [ "$ok" != 1 ]; then
              echo "::error::main is still protected. Enable 'Allow force pushes' on the main branch rule, then re-run this workflow (Actions → Republish clean history → Re-run all jobs)."
              exit 1
            fi
          else
            echo "::error::origin/main is at $CUR but the manifest expects $OLD_MAIN (or $NEW_MAIN). History moved since the manifest was built — rebuild the manifest before republishing."
            exit 1
          fi

          # Move every tag to its rewritten counterpart.
          jq -c '.tags[]' "$M" | while read -r t; do
            name=$(jq -r .name <<<"$t"); typ=$(jq -r .type <<<"$t")
            if [ "$typ" = "tag" ]; then
              sha=$(jq -r .raw_tag_b64 <<<"$t" | base64 -d | git hash-object -t tag -w --stdin)
              expect=$(jq -r .new_tag_sha <<<"$t")
              if [ "$sha" != "$expect" ]; then
                echo "::error::rebuilt tag object for $name is $sha, expected $expect"; exit 1
              fi
              git update-ref "refs/tags/$name" "$sha"
            else
              git update-ref "refs/tags/$name" "$(jq -r .new_target <<<"$t")"
            fi
            echo "staged $name"
          done
          git push --force origin 'refs/tags/*:refs/tags/*'
          echo "all tags republished"

      - name: Cleanup helper branches
        if: success()
        run: |
          git push origin :refs/heads/zz-ccr-probe || true
          git push origin :refs/heads/chore/republish-aux || true
          git push origin :refs/heads/chore/republish-clean-history || true
          echo "::notice::Republish complete. If you enabled 'Allow force pushes' on main, disable it again now."
