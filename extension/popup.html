<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse Web Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      width: 340px;
      background: #0d1117;
      color: #c9d1d9;
    }

    header {
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .logo {
      width: 20px;
      height: 20px;
      background: #58a6ff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #0d1117;
      flex-shrink: 0;
    }

    main { padding: 12px 16px; }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #58a6ff;
    }

    #status {
      min-height: 20px;
      font-size: 12px;
      padding: 6px 0;
      border-radius: 4px;
    }

    #status.ok  { color: #3fb950; }
    #status.err { color: #f85149; }
    #status.inf { color: #8b949e; }

    button {
      width: 100%;
      padding: 8px;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #f0f6fc;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover:not(:disabled) { background: #2ea043; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: #58a6ff;
      text-decoration: none;
      padding-top: 8px;
    }

    .settings-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="logo">S</div>
    <h1>Synapse Clipper</h1>
  </header>

  <main>
    <div class="field">
      <label for="titleInput">Title (editable)</label>
      <input type="text" id="titleInput" placeholder="Article title..." />
    </div>

    <div id="status" class="inf">Loading page info...</div>

    <button id="clipBtn" disabled>Clip to Synapse</button>

    <a href="options.html" target="_blank" class="settings-link">Settings</a>
  </main>

  <!-- vendor libraries (executed in the page context via scripting.executeScript) -->
  <script src="popup.js"></script>
</body>
</html>
